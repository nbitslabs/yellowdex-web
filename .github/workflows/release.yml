name: Release

on:
  push:
    branches:
      - main
  # Allow manual releases with custom version type
  workflow_dispatch:
    inputs:
      release-type:
        description: 'Release type (major, minor, patch)'
        required: true
        default: 'patch'
        type: choice
        options:
          - major
          - minor
          - patch

permissions:
  contents: write  # Required to create tags and releases
  pull-requests: read  # Required to read PR titles for release notes

jobs:
  release:
    name: Create Release
    runs-on: ubuntu-latest
    # Only run on main branch pushes, not on tag pushes (prevents recursion)
    if: github.ref == 'refs/heads/main' && !startsWith(github.event.head_commit.message, 'chore(release):')

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          # Fetch all history and tags for changelog generation
          fetch-depth: 0
          # Use GITHUB_TOKEN for authentication
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Determine the next version by analyzing conventional commits
      # Uses package.json version as baseline
      - name: Get current version
        id: get-version
        run: |
          CURRENT_VERSION=$(node -p "require('./package.json').version")
          echo "current=$CURRENT_VERSION" >> $GITHUB_OUTPUT

          # Get the latest git tag (if any)
          LATEST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
          echo "latest-tag=$LATEST_TAG" >> $GITHUB_OUTPUT

      # Analyze commits since last release to determine version bump
      # feat: commits trigger minor bump
      # fix: commits trigger patch bump
      # BREAKING CHANGE or ! commits trigger major bump
      # Manual dispatch uses the selected release type
      - name: Determine version bump
        id: version-bump
        run: |
          LATEST_TAG="${{ steps.get-version.outputs.latest-tag }}"

          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            BUMP_TYPE="${{ inputs.release-type }}"
            echo "Using manual release type: $BUMP_TYPE"
          else
            # Get commits since last tag
            if git rev-parse "$LATEST_TAG" >/dev/null 2>&1; then
              COMMITS=$(git log $LATEST_TAG..HEAD --pretty=format:"%s")
            else
              COMMITS=$(git log --pretty=format:"%s")
            fi

            # Default to patch
            BUMP_TYPE="patch"

            # Check for breaking changes (major)
            if echo "$COMMITS" | grep -qE "^[a-z]+(\([a-z]+\))?!:|BREAKING CHANGE:"; then
              BUMP_TYPE="major"
            # Check for features (minor)
            elif echo "$COMMITS" | grep -qE "^feat(\([a-z]+\))?:"; then
              BUMP_TYPE="minor"
            fi

            echo "Detected bump type from commits: $BUMP_TYPE"
          fi

          echo "type=$BUMP_TYPE" >> $GITHUB_OUTPUT

      # Calculate new version based on bump type
      - name: Calculate new version
        id: new-version
        run: |
          CURRENT="${{ steps.get-version.outputs.current }}"
          BUMP_TYPE="${{ steps.version-bump.outputs.type }}"

          # Parse version (assumes semver format: MAJOR.MINOR.PATCH)
          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"

          case $BUMP_TYPE in
            major)
              MAJOR=$((MAJOR + 1))
              MINOR=0
              PATCH=0
              ;;
            minor)
              MINOR=$((MINOR + 1))
              PATCH=0
              ;;
            patch)
              PATCH=$((PATCH + 1))
              ;;
          esac

          NEW_VERSION="$MAJOR.$MINOR.$PATCH"
          echo "version=$NEW_VERSION" >> $GITHUB_OUTPUT
          echo "tag=v$NEW_VERSION" >> $GITHUB_OUTPUT
          echo "New version will be: v$NEW_VERSION"

      # Update package.json with new version
      - name: Update package.json version
        run: |
          npm version ${{ steps.new-version.outputs.version }} --no-git-tag-version

      # Generate release notes from PR titles and commit messages
      # Uses GitHub's auto-generated release notes feature
      - name: Generate release notes
        id: release-notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          LATEST_TAG="${{ steps.get-version.outputs.latest-tag }}"
          NEW_TAG="${{ steps.new-version.outputs.tag }}"

          # Generate release notes using GitHub CLI
          if git rev-parse "$LATEST_TAG" >/dev/null 2>&1; then
            NOTES=$(gh api repos/${{ github.repository }}/releases/generate-notes \
              -f tag_name="$NEW_TAG" \
              -f previous_tag_name="$LATEST_TAG" \
              --jq '.body')
          else
            # First release - include all commits
            NOTES="## Initial Release\n\nFirst release of the Yellowdex landing page."
          fi

          # Write notes to file to preserve formatting
          echo "$NOTES" > /tmp/release-notes.md
          echo "notes-file=/tmp/release-notes.md" >> $GITHUB_OUTPUT

      # Commit version bump (this won't trigger another release due to commit message check)
      - name: Commit version bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add package.json
          git commit -m "chore(release): bump version to ${{ steps.new-version.outputs.version }}"
          git push

      # Create git tag for the release
      - name: Create git tag
        run: |
          git tag -a "${{ steps.new-version.outputs.tag }}" -m "Release ${{ steps.new-version.outputs.tag }}"
          git push origin "${{ steps.new-version.outputs.tag }}"

      # Create GitHub Release with auto-generated notes
      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ steps.new-version.outputs.tag }}" \
            --title "Release ${{ steps.new-version.outputs.tag }}" \
            --notes-file "${{ steps.release-notes.outputs.notes-file }}" \
            --verify-tag

      # Output release information for visibility in Actions UI
      - name: Release summary
        run: |
          echo "## Release Created ✓" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Version:** ${{ steps.new-version.outputs.tag }}" >> $GITHUB_STEP_SUMMARY
          echo "**Bump Type:** ${{ steps.version-bump.outputs.type }}" >> $GITHUB_STEP_SUMMARY
          echo "**Previous Version:** ${{ steps.get-version.outputs.latest-tag }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "[View Release](https://github.com/${{ github.repository }}/releases/tag/${{ steps.new-version.outputs.tag }})" >> $GITHUB_STEP_SUMMARY
